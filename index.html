                });
                deleteBtn.addEventListener('click', async e => {
                    e.stopPropagation();
                    await deleteBoardList(board.id);
                });

                item.addEventListener('mousedown', e => {
                    if (e.button !== 0) return;
                    if (e.target.closest('.task-list-actions')) return;
                    item.draggable = true;
                });
                item.addEventListener('mouseup', () => {
                    if (!draggedTaskListId) item.draggable = false;
                });
                item.addEventListener('mouseleave', () => {
                    if (!draggedTaskListId) item.draggable = false;
                });
                item.addEventListener('dragstart', e => {
                    if (!item.draggable) {
                        e.preventDefault();
                        return;
                    }
                    draggedTaskListId = board.id;
                    taskListNav.classList.add('task-list-dragging');
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', board.id);
                });
                item.addEventListener('dragend', () => {
                    draggedTaskListId = null;
                    item.draggable = false;
                    taskListNav.classList.remove('task-list-dragging');
                    item.classList.remove('dragging');
                    taskListNav.querySelectorAll('.task-list-drop-zone').forEach(el => el.classList.remove('active'));
                });
                item.addEventListener('click', async () => {
                    if (board.id === activeBoardId) return;
                    await switchToBoard(board.id);
                });
                item.addEventListener('keydown', async e => {
                    // Ignore key events originating from nested controls (rename/delete buttons).
                    if (e.target !== item) return;
                    if (e.key !== 'Enter' && e.key !== ' ' && e.key !== 'Spacebar') return;
                    e.preventDefault();
                    if (board.id === activeBoardId) return;
                    await switchToBoard(board.id);
                });
                taskListNav.appendChild(item);
            });
            if (boardList.length > 0) {
                taskListNav.appendChild(createTaskListDropZone(boardList.length));
            }
            updateBoardUserInfo();
        }


        function normalizeBoards(boards) {
            if (!Array.isArray(boards)) return [];
            return boards
                .filter(board => board && typeof board === 'object' && typeof board.id === 'string')
                .map(board => ({
                    id: board.id,
                    name: board.name || 'Gaia'
                }));
        }

        // ── Surgical DOM updaters (driven by task subcollection) ──────
        // These are the ONLY functions that mutate task cards in response
        // to Firestore changes.  They operate on individual cards by
        // taskId, never tearing down the whole board.

        function findCardByTaskId(taskId) {
            return document.querySelector(`.task-card[data-task-id="${taskId}"]`);
        }

        function findColumnById(columnId) {
            return document.querySelector(`.column[data-id="${columnId}"]`);
        }

        // Insert a task card into the correct column at the correct
        // position (determined by orderKey).
        function renderTaskAdded(task) {
            // Deduplicate: if a card with this ID is already in the DOM
            // (e.g. optimistic insert from local action), skip.
            if (findCardByTaskId(task.id)) return;

            const col = findColumnById(task.columnId);
            if (!col) return;  // column not rendered yet — will appear on next full load

            const listSelector = task.done ? '.completed-list' : '.task-list';
            const list = col.querySelector(listSelector);
            if (!list) return;

            const card = createTaskCard(task.text, task.done, task.id);
            card.dataset.orderKey = task.orderKey || '';

            // Insert at sorted position within the list.
            let inserted = false;
            for (const existing of list.children) {
                const existingKey = existing.dataset.orderKey || '';
                if (task.orderKey && existingKey && task.orderKey < existingKey) {
                    list.insertBefore(card, existing);
                    inserted = true;
                    break;
                }
            }
            if (!inserted) list.appendChild(card);
            updateDivider(col);
        }

        function renderTaskModified(task) {
            const card = findCardByTaskId(task.id);
            if (!card) {
                // Card doesn't exist yet — treat as an add.
                renderTaskAdded(task);
                return;
            }

            // Update text
            const span = card.querySelector('span');
            if (span && span.textContent !== task.text) {
                // Don't clobber text while the user is actively editing this card
                if (card.dataset.inlineEditing !== 'true') {
                    span.textContent = task.text;
                }
            }

            // Update done state
            const wasDone = card.classList.contains('done');
            if (wasDone !== task.done) {
                card.classList.toggle('done', task.done);
                const btn = card.querySelector('.done-btn');
                if (btn) {
                    btn.textContent = task.done ? 'It Rolled Back' : 'Summit!';
                    btn.classList.toggle('undo', task.done);
                }
            }

            // Update orderKey
            card.dataset.orderKey = task.orderKey || '';

            // Move to correct column if columnId changed, or re-sort
            const currentCol = card.closest('.column');
            const targetCol = findColumnById(task.columnId);
            const targetList = targetCol
                ? targetCol.querySelector(task.done ? '.completed-list' : '.task-list')
                : null;

            if (targetCol && targetList) {
                const currentList = card.parentElement;
                const needsMove = currentCol !== targetCol
                    || currentList !== targetList;

                if (needsMove) {
                    card.remove();
                    // Insert at sorted position
                    let inserted = false;
                    for (const existing of targetList.children) {
                        const existingKey = existing.dataset.orderKey || '';
                        if (task.orderKey && existingKey && task.orderKey < existingKey) {
                            targetList.insertBefore(card, existing);
                            inserted = true;
                            break;
                        }
                    }
                    if (!inserted) targetList.appendChild(card);
                    if (currentCol) updateDivider(currentCol);
                    updateDivider(targetCol);
                } else {
                    // Same list — check if position changed
                    const siblings = Array.from(targetList.children);
                    const currentIndex = siblings.indexOf(card);
                    let correctIndex = siblings.length - 1;
                    for (let i = 0; i < siblings.length; i++) {
                        if (siblings[i] === card) continue;
                        const sibKey = siblings[i].dataset.orderKey || '';
                        if (task.orderKey && sibKey && task.orderKey < sibKey) {
                            correctIndex = i > currentIndex ? i - 1 : i;
                            break;
                        }
                    }
                    if (currentIndex !== correctIndex) {
                        card.remove();
                        if (correctIndex >= targetList.children.length) {
                            targetList.appendChild(card);
                        } else {
                            targetList.insertBefore(card, targetList.children[correctIndex]);
                        }
                    }
                }
            }
        }

        function renderTaskRemoved(taskId) {
            const card = findCardByTaskId(taskId);
            if (!card) return;
            const col = card.closest('.column');
            card.remove();
            if (col) updateDivider(col);
        }

        // ── Task subcollection listener ───────────────────────────────
        // Subscribes to all tasks for the active board and applies
        // surgical DOM updates via docChanges().

        function unsubscribeTasksListenerIfActive() {
            if (unsubscribeTasksListener) {
                unsubscribeTasksListener();
                unsubscribeTasksListener = null;
            }
        }

        function subscribeTasksForBoard(boardId) {
            unsubscribeTasksListenerIfActive();
            if (!currentUser || !boardId) return;

            const q = query(tasksCollectionRef(boardId), orderBy('orderKey'));
            unsubscribeTasksListener = onSnapshot(q, snapshot => {
                snapshot.docChanges().forEach(change => {
                    const task = { id: change.doc.id, ...change.doc.data() };
                    switch (change.type) {
                        case 'added':
                            renderTaskAdded(task);
                            break;
                        case 'modified':
                            renderTaskModified(task);
                            break;
                        case 'removed':
                            renderTaskRemoved(task.id);
                            break;
                    }
                });
            }, e => {
                console.error('Task listener failed:', e);
            });
        }

        function subscribeBoardStore() {
            if (!currentUser) return;
            if (unsubscribeBoardStore) unsubscribeBoardStore();
            unsubscribeBoardStore = onSnapshot(
                boardStoreRef(),
                snap => {
                    boardStoreCache = snap.exists() ? snap.data() : {};
                    const remoteBoards = normalizeBoards(boardStoreCache.boards);
                    if (remoteBoards.length > 0) {
                        const remoteIds = new Set(remoteBoards.map(b => b.id));
                        pendingBoardCreates.forEach(id => {
                            if (remoteIds.has(id)) pendingBoardCreates.delete(id);
                        });
                        const pendingLocalBoards = boardList.filter(
                            board => pendingBoardCreates.has(board.id) && !remoteIds.has(board.id)
                        );
                        const effectiveBoards = pendingLocalBoards.length > 0
                            ? [...remoteBoards, ...pendingLocalBoards]
                            : remoteBoards;
                        const remoteSig = JSON.stringify(effectiveBoards.map(b => ({ id: b.id, name: b.name })));
                        const localSig = JSON.stringify(boardList.map(b => ({ id: b.id, name: b.name })));
                        if (remoteSig !== localSig) {
                            boardList = effectiveBoards;
                        }
                    }

                    if (!boardList.length) return;
                    if (!activeBoardId || !boardList.some(b => b.id === activeBoardId)) {
                        activeBoardId = boardList[0].id;
                    }

                    // Column metadata sync (names, order) — task data is now
                    // handled by the per-board task subcollection listener.
                    // Only re-render column *shells* if column structure changed.
                    if (!savePromise) {
                        const remoteState = readBoardState(boardStoreCache, activeBoardId);
                        if (Array.isArray(remoteState.columns)) {
                            const currentColIds = Array.from(document.querySelectorAll('.column'))
                                .map(c => c.dataset.id);
                            const remoteColIds = remoteState.columns.map(c => c.id);
                            const currentNames = Array.from(document.querySelectorAll('.column .column-title'))
                                .map(input => input.value);
                            const remoteNames = remoteState.columns.map(c => c.name);
                            // Re-render columns only if column set or names changed
                            if (JSON.stringify(currentColIds) !== JSON.stringify(remoteColIds)
                                || JSON.stringify(currentNames) !== JSON.stringify(remoteNames)) {
                                cleanupColumns();
                                // Render column shells with empty task arrays —
                                // the task listener will populate them.
                                remoteState.columns.forEach(c => {
                                    const col = createColumnElement(c.id, c.name, [], []);
                                    insertColumnIntoBoard(col);
                                });
                                // Re-subscribe tasks so the initial snapshot
                                // populates the fresh column shells.
                                subscribeTasksForBoard(activeBoardId);
                            }
                        }
                    }
                    renderTaskListNav();
                },
                e => {
                    console.error('Live sync failed:', e);
                }
            );
        }

        function unsubscribeBoardStoreListener() {
            unsubscribeTasksListenerIfActive();
            if (!unsubscribeBoardStore) return;
            unsubscribeBoardStore();
            unsubscribeBoardStore = null;
        }

        async function loadBoard(boardId) {
            cleanupColumns();
            unsubscribeTasksListenerIfActive();
            activeBoardId = boardId;
            try {
                const data = await getBoardStoreData();
                const localSnapshot = readLocalStore();
                const remoteState = readBoardState(data, boardId);
                const localState = readBoardState(localSnapshot, boardId);

                // Determine which column metadata to use for rendering shells.
                let columnsSource = null;
                if (shouldPreferLocalColumns(localState, remoteState)) {
                    columnsSource = localState.columns;
                    if (localState.meta.dirty && Array.isArray(localState.columns)) {
                        commitSaveNow(boardId, localState.columns, localState.meta.updatedAt);
                    }
                } else if (Array.isArray(remoteState.columns)) {
                    columnsSource = remoteState.columns;
                    const remoteVersion = remoteState.meta.updatedAt || nextSaveVersion();
                    persistLocalBoardColumns(
                        boardId,
                        remoteState.columns,
                        { updatedAt: remoteVersion, dirty: false }
                    );
                } else if (Array.isArray(localState.columns)) {
                    columnsSource = localState.columns;
                    if (localState.meta.dirty) {
                        commitSaveNow(boardId, localState.columns, localState.meta.updatedAt);
                    }
                }

                // Render column shells (empty — no task arrays).
                // The task subcollection listener will populate cards.
                if (Array.isArray(columnsSource) && columnsSource.length > 0) {
                    columnsSource.forEach(c => {
                        const col = createColumnElement(c.id, c.name, [], []);
                        insertColumnIntoBoard(col);
                    });
                } else {
                    renderDefaultColumns();
                }

                // Start listening for task documents.
                subscribeTasksForBoard(boardId);
            } catch (e) {
                console.error('Load failed:', e);
                const local = readLocalStore();
                const localState = readBoardState(local, boardId);
                if (Array.isArray(localState.columns) && localState.columns.length > 0) {
                    localState.columns.forEach(c => {
                        const col = createColumnElement(c.id, c.name, [], []);
                        insertColumnIntoBoard(col);
                    });
                } else {
                    renderDefaultColumns();
                }
                // Still try to subscribe even on error.
                subscribeTasksForBoard(boardId);
            }
        }

        async function switchToBoard(boardId) {
            if (!currentUser || !boardId) return;
            await flushPendingSave();
            await loadBoard(boardId);
            renderTaskListNav();
        }

        async function createTaskList() {
            if (!currentUser) {
                await showModal({ type: 'alert', title: 'Not Signed In', message: 'Please sign in again before creating a new world.' });
                return;
            }
            newTaskListBtn.disabled = true;
            try {
                await flushPendingSaveWithTimeout();
                const defaultColumns = createDefaultColumns();
                const newBoard = createBoardMeta();
                boardList.push(newBoard);
                pendingBoardCreates.add(newBoard.id);
                renderTaskListNav();
                await loadBoard(newBoard.id);
                const seedVersion = nextSaveVersion();
                try {
                    await setDoc(
                        boardStoreRef(),
                        {
                            columnsByBoard: { [newBoard.id]: defaultColumns },
                            columnsMetaByBoard: { [newBoard.id]: { updatedAt: seedVersion } }
                        },
                        { merge: true }
                    );
                    persistLocalBoardColumns(
                        newBoard.id,
                        defaultColumns,
                        { updatedAt: seedVersion, dirty: false }
                    );
                } catch (e) {
                    console.warn('Could not pre-seed default columns for new task list:', e);
                    persistLocalBoardColumns(
                        newBoard.id,
                        defaultColumns,
                        { updatedAt: seedVersion, dirty: true }
                    );
                }
                await persistBoardsIndex();
                renderTaskListNav();
            } catch (e) {
                console.error('Failed to create task list:', e);
                await showModal({ type: 'alert', title: 'Error', message: 'Could not create a new world right now. Please try again.' });
            } finally {
                newTaskListBtn.disabled = false;
            }
        }

        // ── Task migration (Phase 3) ──────────────────────────────────
        // On first login after the subcollection switch, copy each task
        // from the legacy columnsByBoard arrays into individual Firestore
        // documents.  Idempotent: guarded by a `tasksMigrated` flag and
        // uses `setDoc` so re-runs simply overwrite identical data.
        async function migrateUserTasksIfNeeded(data) {
            if (!currentUser || !data) return;
            if (data.tasksMigrated) return;

            const columnsByBoard = readColumnsByBoardMap(data);
            const boardIds = Object.keys(columnsByBoard);
            if (boardIds.length === 0) {
                // Nothing to migrate — mark done so we don't check again.
                await setDoc(boardStoreRef(), { tasksMigrated: true }, { merge: true });
                return;
            }

            console.log('[migration] Migrating legacy tasks to subcollection…');
            for (const boardId of boardIds) {
                const columns = columnsByBoard[boardId];
                if (!Array.isArray(columns)) continue;

                let orderIndex = 0;
                for (const col of columns) {
                    if (!col || !col.id) continue;

                    // Active tasks
                    const tasks = Array.isArray(col.tasks) ? col.tasks : [];
                    for (const text of tasks) {
                        if (typeof text !== 'string' || !text.trim()) continue;
                        const taskId = createEntityId('task');
                        const orderKey = String(orderIndex++).padStart(8, '0');
                        await setDoc(taskDocRef(boardId, taskId), {
                            id: taskId,
                            text: text.trim(),
                            columnId: col.id,
                            done: false,
                            orderKey,
                            createdAt: serverTimestamp()
                        });
                    }

                    // Completed tasks
                    const completed = Array.isArray(col.completed) ? col.completed : [];
                    for (const text of completed) {
                        if (typeof text !== 'string' || !text.trim()) continue;
                        const taskId = createEntityId('task');
                        const orderKey = String(orderIndex++).padStart(8, '0');
                        await setDoc(taskDocRef(boardId, taskId), {
                            id: taskId,
                            text: text.trim(),
                            columnId: col.id,
                            done: true,
                            orderKey,
                            createdAt: serverTimestamp()
                        });
                    }
                }
                console.log(`[migration] Board "${boardId}": migrated ${orderIndex} tasks.`);
            }

            await setDoc(boardStoreRef(), { tasksMigrated: true }, { merge: true });
            console.log('[migration] Migration complete.');
        }

        // Helper: collect all orderKeys for active (or done) tasks in a column.
        function getOrderKeysInColumn(columnEl, listSelector) {
            const keys = [];
            columnEl.querySelectorAll(`${listSelector} .task-card`).forEach(card => {
                if (card.dataset.orderKey) keys.push(card.dataset.orderKey);
            });
            return keys;
        }

        async function initializeBoards() {
            try {
                const data = await getBoardStoreData();
                await migrateUserTasksIfNeeded(data);
                const local = readLocalStore();
                const boardsSource = Array.isArray(data.boards) && data.boards.length > 0
                    ? data.boards
                    : null;
                if (boardsSource && boardsSource.length > 0) {
                    const remoteBoards = normalizeBoards(boardsSource);
                    const localBoards = Array.isArray(local.boards) ? normalizeBoards(local.boards) : [];
                    const remoteIds = new Set(remoteBoards.map(board => board.id));
                    const localOnlyBoards = localBoards.filter(board => {
                        if (remoteIds.has(board.id)) return false;
                        const localState = readBoardState(local, board.id);
                        return Array.isArray(localState.columns) || localState.meta.dirty;
                    });
                    boardList = localOnlyBoards.length > 0
                        ? [...remoteBoards, ...localOnlyBoards]
                        : remoteBoards;
                    if (localOnlyBoards.length > 0) {
                        // Promote locally-created boards that never made it to cloud.
                        await persistBoardsIndex();
                    }
                } else if (Array.isArray(local.boards) && local.boards.length > 0) {
                    // One-time recovery path: promote local cache to cloud if remote index is empty.
                    boardList = normalizeBoards(local.boards);
                    await persistBoardsIndex();
                    const localColumnsByBoard = local.columnsByBoard && typeof local.columnsByBoard === 'object'
                        ? local.columnsByBoard
                        : {};
                    const localColumnsMetaByBoard = local.columnsMetaByBoard && typeof local.columnsMetaByBoard === 'object'
                        ? local.columnsMetaByBoard
                        : {};
                    for (const board of boardList) {
                        const cachedCols = localColumnsByBoard[board.id];
                        if (Array.isArray(cachedCols)) {
                            const cachedMeta = localColumnsMetaByBoard[board.id];
                            const cachedUpdatedAt = normalizeUpdatedAt(cachedMeta && cachedMeta.updatedAt) || nextSaveVersion();
                            await setDoc(
                                boardStoreRef(),
                                {
                                    columnsByBoard: { [board.id]: cachedCols },
                                    columnsMetaByBoard: { [board.id]: { updatedAt: cachedUpdatedAt } }
                                },
                                { merge: true }
                            );
                            markLocalBoardCleanIfCurrent(board.id, cachedUpdatedAt);
                        }
                    }
                } else {
                    // Migration path: if legacy single-board data exists, seed Gaia 1 from it.
                    const seededColumns = Array.isArray(data.columns)
                        ? data.columns
                        : createDefaultColumns();
                    boardList = [createBoardMeta('Gaia 1')];
                    const seedVersion = nextSaveVersion();
                    try {
                        await setDoc(
                            boardStoreRef(),
                            {
                                columnsByBoard: { [boardList[0].id]: seededColumns },
                                columnsMetaByBoard: { [boardList[0].id]: { updatedAt: seedVersion } }
                            },
                            { merge: true }
                        );
                        persistLocalBoardColumns(
                            boardList[0].id,
                            seededColumns,
                            { updatedAt: seedVersion, dirty: false }
                        );
                    } catch (e) {
                        console.warn('Could not pre-seed first task list:', e);
                        persistLocalBoardColumns(
                            boardList[0].id,
                            seededColumns,
                            { updatedAt: seedVersion, dirty: true }
                        );
                    }
                    writeLocalStore({
                        boards: boardList
                    });
                    await persistBoardsIndex();
                }

                queueDirtyLocalBoardsForSync(data);
                const preferredBoard = activeBoardId && boardList.some(b => b.id === activeBoardId)
                    ? activeBoardId
                    : boardList[0].id;
                await loadBoard(preferredBoard);
                renderTaskListNav();
            } catch (e) {
                console.error('Board initialization failed:', e);
                // Ensure first-time users always land on Gaia 1, even if remote init fails.
                if (!boardList.length) {
                    boardList = [createBoardMeta('Gaia 1')];
                }
                await loadBoard(boardList[0].id);
                renderTaskListNav();
            }
        }

        // ── Helpers ───────────────────────────────────────────────────
        function updateDivider(col) {
            const hasCompleted = col.querySelector('.completed-list').children.length > 0;
            col.querySelector('.completed-divider').classList.toggle('visible', hasCompleted);
        }

        function clearColumnDragOverStates() {
            document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
        }

        function clearTaskInsertIndicator() {
            taskInsertIndicator.remove();
            activeTaskDropList = null;
        }

        function getTaskDropReference(listEl, clientY) {
            const cards = Array.from(listEl.querySelectorAll('.task-card:not(.dragging)'));
            let nearest = null;
            let nearestOffset = Number.NEGATIVE_INFINITY;
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const offset = clientY - rect.top - rect.height / 2;
                if (offset < 0 && offset > nearestOffset) {
                    nearestOffset = offset;
                    nearest = card;
                }
            });
            return nearest;
        }

        function getAdjacentTaskCards(card) {
            let prev = card.previousElementSibling;
            while (prev && !prev.classList.contains('task-card')) prev = prev.previousElementSibling;
            let next = card.nextElementSibling;
            while (next && !next.classList.contains('task-card')) next = next.nextElementSibling;
            return { prev, next };
        }

        function bindTaskListDropHandlers(col, listEl) {
            listEl.addEventListener('dragover', e => {
                if (!draggedCard) return;
                const listIsDone = listEl.classList.contains('completed-list');
                const draggedIsDone = draggedCard.classList.contains('done');
                if (listIsDone !== draggedIsDone) return;

                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                clearColumnDragOverStates();
                col.classList.add('drag-over');

                const beforeCard = getTaskDropReference(listEl, e.clientY);
                if (beforeCard) listEl.insertBefore(taskInsertIndicator, beforeCard);
                else listEl.appendChild(taskInsertIndicator);
                activeTaskDropList = listEl;
            });

            listEl.addEventListener('dragleave', e => {
                if (!draggedCard) return;
                if (listEl.contains(e.relatedTarget)) return;
                if (activeTaskDropList === listEl) clearTaskInsertIndicator();
                if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
            });

            listEl.addEventListener('drop', e => {
                if (!draggedCard) return;
                const listIsDone = listEl.classList.contains('completed-list');
                const draggedIsDone = draggedCard.classList.contains('done');
                if (listIsDone !== draggedIsDone) return;

                e.preventDefault();
                e.stopPropagation();
                col.classList.remove('drag-over');

                if (taskInsertIndicator.parentElement !== listEl) {
                    const beforeCard = getTaskDropReference(listEl, e.clientY);
                    if (beforeCard) listEl.insertBefore(taskInsertIndicator, beforeCard);
                    else listEl.appendChild(taskInsertIndicator);
                }
                listEl.insertBefore(draggedCard, taskInsertIndicator);
                clearTaskInsertIndicator();
                clearColumnDragOverStates();

                document.querySelectorAll('.column').forEach(c => updateDivider(c));

                const taskId = draggedCard.dataset.taskId;
                if (taskId && currentUser && activeBoardId) {
                    const { prev, next } = getAdjacentTaskCards(draggedCard);
                    const prevKey = prev?.dataset.orderKey || null;
                    const nextKey = next?.dataset.orderKey || null;
                    const newOrderKey = orderKeyBetween(prevKey, nextKey);
                    draggedCard.dataset.orderKey = newOrderKey;
                    updateDoc(taskDocRef(activeBoardId, taskId), {
                        columnId: col.dataset.id,
                        orderKey: newOrderKey
                    }).catch(err => console.error('moveTask write failed:', err));
                }
                draggedCard = null;
            });
        }

        function createTaskCard(text, done = false, taskId = null) {
            const li = document.createElement('li');
            li.className = 'task-card' + (done ? ' done' : '');
            li.draggable = true;
            if (taskId) li.dataset.taskId = taskId;

            // Use textContent (never innerHTML) for user-supplied text to prevent XSS
            const span = document.createElement('span');
            span.textContent = text;

            const doneBtn = document.createElement('button');
            doneBtn.className = done ? 'done-btn undo' : 'done-btn';
            doneBtn.textContent = done ? 'It Rolled Back' : 'Summit!';
            doneBtn.addEventListener('click', () => toggleDone(li));

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-task-btn';
            deleteBtn.textContent = 'Drop It';
            deleteBtn.addEventListener('click', () => deleteTask(li));

            const buttons = document.createElement('div');
            buttons.className = 'card-buttons';
            buttons.appendChild(doneBtn);
            buttons.appendChild(deleteBtn);

            li.appendChild(span);
            li.appendChild(buttons);
            span.dataset.tooltip = 'Click to edit task';
            span.addEventListener('click', e => {
                e.stopPropagation();
                beginInlineTaskEdit(li);
            });

            li.addEventListener('dragstart', e => {
                clearTaskInsertIndicator();
                clearColumnDragOverStates();
                draggedCard = li;
                li.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            li.addEventListener('dragend', () => {
                li.classList.remove('dragging');
                clearTaskInsertIndicator();
                clearColumnDragOverStates();
            });
            return li;
        }

        function beginInlineTaskEdit(card) {
            if (!card || card.dataset.inlineEditing === 'true') return;
            const textEl = card.querySelector('span');
            if (!textEl) return;

            const originalText = textEl.textContent || '';
            const wasDraggable = card.draggable;
            card.dataset.inlineEditing = 'true';
            card.classList.add('editing');
            card.draggable = false;
            textEl.setAttribute('contenteditable', 'true');
            textEl.spellcheck = true;
            textEl.focus();

            const selection = window.getSelection();
            if (selection) {
                const range = document.createRange();
                range.selectNodeContents(textEl);
                range.collapse(false);
                selection.removeAllRanges();
                selection.addRange(range);
            }

            let cancelled = false;
            const finish = () => {
                textEl.removeEventListener('keydown', onKeydown);
                textEl.removeEventListener('blur', onBlur);
                textEl.removeAttribute('contenteditable');
                textEl.spellcheck = false;
                card.classList.remove('editing');
                card.draggable = wasDraggable;
                delete card.dataset.inlineEditing;

                if (cancelled) {
                    textEl.textContent = originalText;
                    return;
                }

                let nextText = (textEl.textContent || '').trim();
                if (!nextText) {
                    textEl.textContent = originalText;
                    return;
                }
                if (nextText.length > 500) {
                    nextText = nextText.slice(0, 500);
                }
                textEl.textContent = nextText;
                if (nextText !== originalText) {
                    // Write to subcollection only.
                    const taskId = card.dataset.taskId;
                    if (taskId && currentUser && activeBoardId) {
                        updateDoc(taskDocRef(activeBoardId, taskId), { text: nextText })
                            .catch(e => console.error('renameTask write failed:', e));
                    }
                }
            };

            const onKeydown = e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    textEl.blur();
                    return;
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    cancelled = true;
                    textEl.blur();
                }
            };

            const onBlur = () => finish();
            textEl.addEventListener('keydown', onKeydown);
            textEl.addEventListener('blur', onBlur);
        }

        // ── Column drop zones ─────────────────────────────────────────
        function makeDropZone() {
            const zone = document.createElement('div');
            zone.className = 'col-drop-zone';
            zone.addEventListener('dragover', e => {
                e.preventDefault();
                document.querySelectorAll('.col-drop-zone').forEach(z => z.classList.remove('active'));
                zone.classList.add('active');
                activeDropZone = zone;
            });
            zone.addEventListener('dragleave', () => zone.classList.remove('active'));
            zone.addEventListener('drop', e => e.preventDefault());
            return zone;
        }

        function showDropZones() {
            boardEl.querySelectorAll('.column').forEach(col => boardEl.insertBefore(makeDropZone(), col));
            insertColumnIntoBoard(makeDropZone());
        }

        function hideDropZones() {
            document.querySelectorAll('.col-drop-zone').forEach(z => z.remove());
            activeDropZone = null;
        }

        function createColumnElement(id, name, tasks = [], completed = []) {
            const col = document.createElement('div');
            col.className = 'column';
            col.dataset.id = id;
            col.innerHTML = `
                <div class="column-header">
                    <div class="col-drag-handle" data-tooltip="Drag to reorder">⠿</div>
                    <input class="column-title" type="text" data-tooltip="Click to rename" maxlength="100" />
                    <button class="delete-col-btn" data-tooltip="Delete column">✕</button>
                </div>
                <div class="task-input-row">
                    <input class="task-input" type="text" maxlength="500" />
                    <button class="add-task-btn">+ Boulder</button>
                </div>
                <ul class="task-list"></ul>
                <div class="completed-divider">Rolled Over the Top</div>
                <ul class="completed-list"></ul>`;

            // Set column title via .value (not innerHTML) to prevent XSS from saved names
            col.querySelector('.column-title').value = name;

            col.querySelector('.column-title').addEventListener('change', saveBoard);
            col.querySelector('.delete-col-btn').addEventListener('click', () => deleteColumn(col));
            col.querySelector('.add-task-btn').addEventListener('click', () => addTask(col));
            startPlaceholderRotation(col.querySelector('.task-input'));
            col.querySelector('.task-input').addEventListener('keypress', e => {
                if (e.key === 'Enter') addTask(col);
            });
            bindTaskListDropHandlers(col, col.querySelector('.task-list'));
            bindTaskListDropHandlers(col, col.querySelector('.completed-list'));

            // Column drag handle
            const handle = col.querySelector('.col-drag-handle');
            handle.addEventListener('mousedown', () => col.draggable = true);
            handle.addEventListener('mouseup', () => col.draggable = false);
            col.addEventListener('dragstart', e => {
                // Ignore if this is a task card drag bubbling up
                if (draggedCard !== null || !col.draggable) return;
                draggedColumn = col;
                activeDropZone = null;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => { col.classList.add('col-dragging'); showDropZones(); }, 0);
            });
            col.addEventListener('dragend', () => {
                col.draggable = false;
                col.classList.remove('col-dragging');
                if (draggedColumn && activeDropZone) {
                    const nextEl = activeDropZone.nextElementSibling;
                    insertColumnIntoBoard(draggedColumn, nextEl || addColumnBtn);
                    saveBoard();
                }
                draggedColumn = null;
                hideDropZones();
            });

            // Task card drop handling on column
            col.addEventListener('dragover', e => {
                e.preventDefault();
                if (draggedCard && !activeTaskDropList) col.classList.add('drag-over');
            });
            col.addEventListener('dragleave', e => {
                if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
            });
            col.addEventListener('drop', e => {
                e.preventDefault();
                col.classList.remove('drag-over');
                if (draggedCard) {
                    // If a list-level drop target handled insertion, do nothing here.
                    if (activeTaskDropList) return;
                    const isDone = draggedCard.classList.contains('done');
                    const target = isDone
                        ? col.querySelector('.completed-list')
                        : col.querySelector('.task-list');
                    // Optimistic DOM move — snapshot listener will confirm/correct.
                    target.appendChild(draggedCard);
                    document.querySelectorAll('.column').forEach(c => updateDivider(c));
                    // Write to subcollection only.
                    const taskId = draggedCard.dataset.taskId;
                    if (taskId && currentUser && activeBoardId) {
                        const listSelector = isDone ? '.completed-list' : '.task-list';
                        const existingKeys = getOrderKeysInColumn(col, listSelector);
                        const newOrderKey = generateOrderKeyAfterAll(existingKeys);
                        draggedCard.dataset.orderKey = newOrderKey;
                        updateDoc(taskDocRef(activeBoardId, taskId), {
                            columnId: col.dataset.id, orderKey: newOrderKey
                        }).catch(e => console.error('moveTask write failed:', e));
                    }
                    clearTaskInsertIndicator();
                    draggedCard = null;
                }
            });

            tasks.forEach(t => {
                // Support both plain strings (legacy) and task objects (subcollection)
                const text = typeof t === 'string' ? t : (t.text || '');
                const id   = typeof t === 'string' ? null : (t.id || null);
                const key  = typeof t === 'string' ? null : (t.orderKey || null);
                const card = createTaskCard(text, false, id);
                if (key) card.dataset.orderKey = key;
                col.querySelector('.task-list').appendChild(card);
            });
            completed.forEach(t => {
                const text = typeof t === 'string' ? t : (t.text || '');
                const id   = typeof t === 'string' ? null : (t.id || null);
                const key  = typeof t === 'string' ? null : (t.orderKey || null);
                const card = createTaskCard(text, true, id);
                if (key) card.dataset.orderKey = key;
                col.querySelector('.completed-list').appendChild(card);
            });
            updateDivider(col);
            return col;
        }

        // ── Actions ───────────────────────────────────────────────────
        function addTask(col) {
            const input = col.querySelector('.task-input');
            const text = input.value.trim();
            if (!text) return;
            const taskId = createEntityId('task');
            const existingKeys = getOrderKeysInColumn(col, '.task-list');
            const orderKey = generateOrderKeyBeforeAll(existingKeys);
            // Optimistic DOM insert — snapshot listener will confirm/correct.
            const card = createTaskCard(text, false, taskId);
            card.dataset.orderKey = orderKey;
            col.querySelector('.task-list').prepend(card);
            input.value = '';
            if (input._rotatePlaceholder) input._rotatePlaceholder();
            // Write to subcollection only.
            if (currentUser && activeBoardId) {
                setDoc(taskDocRef(activeBoardId, taskId), {
                    id: taskId, text, columnId: col.dataset.id,
                    done: false, orderKey, createdAt: serverTimestamp()
                }).catch(e => console.error('addTask write failed:', e));
            }
        }

        function toggleDone(card) {
            const col = card.closest('.column');
            const wasDone = card.classList.contains('done');
            const isDone = card.classList.toggle('done');
            const btn = card.querySelector('.done-btn');
            btn.textContent = isDone ? 'It Rolled Back' : 'Summit!';
            btn.classList.toggle('undo', isDone);
            if (wasDone) playRollbackVideo();
            else playSummitVideo();
            // Optimistic DOM move — snapshot listener will confirm/correct.
            col.querySelector(isDone ? '.completed-list' : '.task-list')[isDone ? 'appendChild' : 'prepend'](card);
            updateDivider(col);
            // Write to subcollection only.
            const taskId = card.dataset.taskId;
            if (taskId && currentUser && activeBoardId) {
                updateDoc(taskDocRef(activeBoardId, taskId), { done: isDone })
                    .catch(e => console.error('toggleDone write failed:', e));
            }
        }

        function deleteTask(card) {
            const col = card.closest('.column');
            const taskId = card.dataset.taskId;
            playCrushedVideo();
            // Optimistic DOM remove — snapshot listener will confirm.
            card.remove();
            updateDivider(col);
            // Write to subcollection only.
            if (taskId && currentUser && activeBoardId) {
                deleteDoc(taskDocRef(activeBoardId, taskId))
                    .catch(e => console.error('deleteTask write failed:', e));
            }
        }

        async function deleteColumn(col) {
            const taskCount = col.querySelectorAll('.task-card').length;
            const msg = taskCount > 0
                ? `Abandon this struggle and its ${taskCount} task${taskCount > 1 ? 's' : ''}? This cannot be undone.`
                : 'Abandon this struggle? This cannot be undone.';
            const confirmed = await showModal({
                type: 'confirm',
                title: 'Abandon Struggle',
                message: msg,
                confirmLabel: 'Abandon',
                danger: true
            });
            if (!confirmed) return;
            // Clear placeholder rotation intervals before removing the column
            col.querySelectorAll('.task-input').forEach(input => {
                if (input._intervalId) clearInterval(input._intervalId);
            });
            const columnId = col.dataset.id;
            col.remove();
            // Delete tasks from subcollection.
            if (columnId && currentUser && activeBoardId) {
                getDocs(query(tasksCollectionRef(activeBoardId))).then(snap => {
                    const batch = writeBatch(db);
                    snap.forEach(docSnap => {
                        if (docSnap.data().columnId === columnId) {
                            batch.delete(docSnap.ref);
                        }
                    });
                    return batch.commit();
                }).catch(e => console.error('deleteColumn task cleanup failed:', e));
            }
            // Save column metadata (column removed).
            saveBoard();
        }

        function addColumn(name = null, tasks = [], completed = []) {
            if (!name) {
                const count = document.querySelectorAll('.column').length + 1;
                name = 'Mountain ' + count;
            }
            if (name.length > 100) name = name.slice(0, 100);
            const id = createEntityId('col');
            const col = createColumnElement(id, name, tasks, completed);
            insertColumnIntoBoard(col);
            saveBoard();
            return col;
        }

        // ── Auth ──────────────────────────────────────────────────────
        signInBtn.addEventListener('click', async () => {
            signInError.style.display = 'none';
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
                    // Popup was blocked — fall back to redirect
                    try { await signInWithRedirect(auth, provider); }
                    catch (e2) {
                        console.error('Redirect sign in failed:', e2);
                        signInError.textContent = 'Sign in failed: ' + (e2.message || e2.code);
                        signInError.style.display = 'block';
                    }
                } else {
                    console.error('Sign in failed:', e);
                    signInError.textContent = 'Sign in failed: ' + (e.message || e.code);
                    signInError.style.display = 'block';
                }
            }
        });

        // Handle redirect result when returning from Google login without
        // blocking subsequent event listener wiring.
        getRedirectResult(auth).catch(e => {
            console.error('Redirect result error:', e);
        });

        signOutBtn.addEventListener('click', async () => {
            try {
                await flushPendingSave();
                // Sign out first; onAuthStateChanged will handle clearing the board UI
                await signOut(auth);
            } catch (e) {
                console.error('Sign out failed:', e);
                await showModal({ type: 'alert', title: 'Sign Out Failed', message: 'Sign out failed — please try again.' });
            }
        });

        addColumnBtn.addEventListener('click', () => addColumn());
        newTaskListBtn.addEventListener('click', createTaskList);
        window.addEventListener('beforeunload', () => {
            // Flush any pending column-metadata save before close.
            // Task data is already persisted per-action to the subcollection,
            // so only column metadata needs flushing here.
            if (currentUser && activeBoardId) {
                clearTimeout(saveBoardTimer);
                saveBoardTimer = null;
                commitSaveNow();
            }
        });

        // Prevent snap-back when dropping column over child elements
        document.addEventListener('dragover', e => {
            if (draggedColumn) e.preventDefault();
        });
        document.addEventListener('drop', e => {
            if (draggedColumn) e.preventDefault();
        });

        async function applyAuthenticatedState(user) {
            currentUser = user;
            loginScreen.style.display = 'none';
            loadingScreen.style.display = 'flex';

            const accountLabel = user.email || user.displayName || 'Unknown account';
            userName.textContent = accountLabel;
            userAvatar.src = user.photoURL || '';
            userAvatar.style.display = user.photoURL ? 'block' : 'none';
            userAvatar.dataset.tooltip = accountLabel;
            userAvatar.alt = accountLabel;
            userAvatar.setAttribute('aria-label', accountLabel);

            userBar.style.display = 'flex';
            sidebar.style.display = 'block';
            boardStoreCache = null;
            subscribeBoardStore();

            await initializeBoards();
            loadingScreen.style.display = 'none';
            boardEl.style.display = 'flex';
        }

        async function applySignedOutState() {
            await flushPendingSave();
            unsubscribeBoardStoreListener();

            currentUser = null;
            activeBoardId = null;
            boardList = [];
            boardStoreCache = null;
            pendingBoardCreates.clear();

            cleanupColumns();
            taskListNav.innerHTML = '';
            updateBoardUserInfo();
            userAvatar.src = '';
            userAvatar.removeAttribute('data-tooltip');
            userAvatar.alt = '';
            userAvatar.removeAttribute('aria-label');
            userAvatar.style.display = 'none';

            boardEl.style.display = 'none';
            loadingScreen.style.display = 'none';
            userBar.style.display = 'none';
            sidebar.style.display = 'none';
            loginScreen.style.display = 'flex';
        }

        onAuthStateChanged(auth, async user => {
            if (user) {
                await applyAuthenticatedState(user);
                return;
            }
            await applySignedOutState();
        });
    </script>
</body>
</html>
