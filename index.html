                return parsed && typeof parsed === 'object' ? parsed : {};
            } catch {
                return {};
            }
        }

        function writeLocalStore(patch) {
            try {
                const current = readLocalStore();
                localStorage.setItem(localStoreKey(), JSON.stringify({ ...current, ...patch }));
            } catch {
                // Ignore localStorage failures.
            }
        }

        function normalizeUpdatedAt(value) {
            const asNumber = Number(value);
            return Number.isFinite(asNumber) && asNumber > 0 ? asNumber : 0;
        }

        function readColumnsByBoardMap(storeData) {
            const map = storeData && typeof storeData === 'object' ? storeData.columnsByBoard : null;
            return map && typeof map === 'object' ? map : {};
        }

        function readColumnsMetaByBoardMap(storeData) {
            const map = storeData && typeof storeData === 'object' ? storeData.columnsMetaByBoard : null;
            return map && typeof map === 'object' ? map : {};
        }

        function readBoardState(storeData, boardId) {
            const columnsByBoard = readColumnsByBoardMap(storeData);
            const columnsMetaByBoard = readColumnsMetaByBoardMap(storeData);
            const rawMeta = columnsMetaByBoard[boardId];
            return {
                columns: columnsByBoard[boardId],
                meta: {
                    updatedAt: normalizeUpdatedAt(rawMeta && rawMeta.updatedAt),
                    dirty: !!(rawMeta && rawMeta.dirty)
                }
            };
        }

        function shouldPreferLocalColumns(localState, remoteState) {
            if (!Array.isArray(localState.columns)) return false;
            // Only unsynced local edits should override remote.
            // Clean local cache must not block cross-device updates.
            if (!localState.meta.dirty) return !Array.isArray(remoteState.columns);
            if (!Array.isArray(remoteState.columns)) return true;
            return localState.meta.updatedAt >= remoteState.meta.updatedAt;
        }

        function queueDirtyLocalBoardsForSync(remoteData = boardStoreCache || {}) {
            if (!currentUser || !Array.isArray(boardList) || boardList.length === 0) return;
            const localSnapshot = readLocalStore();
            for (const board of boardList) {
                const boardId = board && board.id;
                if (!boardId) continue;
                const localState = readBoardState(localSnapshot, boardId);
                if (!localState.meta.dirty || !Array.isArray(localState.columns)) continue;
                const remoteState = readBoardState(remoteData, boardId);
                if (shouldPreferLocalColumns(localState, remoteState)) {
                    commitSaveNow(boardId, localState.columns, localState.meta.updatedAt);
                }
            }
        }

        async function getBoardStoreData() {
            if (boardStoreCache) return boardStoreCache;
            const snap = await getDoc(boardStoreRef());
            boardStoreCache = snap.exists() ? snap.data() : {};
            return boardStoreCache;
        }

        function collectBoardColumns() {
            const columns = [];
            document.querySelectorAll('.column').forEach(col => {
                const tasks = [];
                const completed = [];
                col.querySelectorAll('.task-list .task-card span').forEach(s => tasks.push(s.textContent));
                col.querySelectorAll('.completed-list .task-card span').forEach(s => completed.push(s.textContent));
                columns.push({
                    id: col.dataset.id,
                    name: col.querySelector('.column-title').value,
                    tasks,
                    completed
                });
            });
            return columns;
        }

        function persistLocalBoardColumns(boardId, columns, options = {}) {
            if (!boardId || !Array.isArray(columns)) return 0;
            const updatedAt = normalizeUpdatedAt(options.updatedAt) || Date.now();
            const dirty = options.dirty !== false;
            const local = readLocalStore();
            writeLocalStore({
                columnsByBoard: { ...(local.columnsByBoard || {}), [boardId]: columns },
                columnsMetaByBoard: {
                    ...(local.columnsMetaByBoard || {}),
                    [boardId]: { updatedAt, dirty }
                }
            });
            return updatedAt;
        }

        function markLocalBoardCleanIfCurrent(boardId, updatedAt) {
            if (!boardId) return;
            const expected = normalizeUpdatedAt(updatedAt);
            if (!expected) return;
            const local = readLocalStore();
            const columnsMetaByBoard = { ...(local.columnsMetaByBoard || {}) };
            const rawMeta = columnsMetaByBoard[boardId];
            if (!rawMeta) return;
            if (normalizeUpdatedAt(rawMeta.updatedAt) !== expected) return;
            columnsMetaByBoard[boardId] = {
                ...rawMeta,
                updatedAt: expected,
                dirty: false
            };
            writeLocalStore({ columnsMetaByBoard });
        }

        async function persistBoardColumns(boardId, columns, updatedAt) {
            if (!currentUser || !boardId) return;
            const version = normalizeUpdatedAt(updatedAt) || Date.now();
            try {
                await setDoc(
                    boardStoreRef(),
                    {
                        columnsByBoard: { [boardId]: columns },
                        columnsMetaByBoard: { [boardId]: { updatedAt: version } }
                    },
                    { merge: true }
                );
                markLocalBoardCleanIfCurrent(boardId, version);
            } catch (e) {
                console.error('Save failed:', e);
            }
        }

        // ── Save queue + debounce ─────────────────────────────────────
        let saveBoardTimer = null;
        const SAVE_DEBOUNCE_MS = 400;
        let latestSaveVersion = 0;

        function nextSaveVersion() {
            const now = Date.now();
            latestSaveVersion = Math.max(now, latestSaveVersion + 1);
            return latestSaveVersion;
        }

        // Immediately enqueue a Firestore write — called by the debounce timer
        // and by flush paths (sign-out, tab close, board switch).
        function commitSaveNow(boardId = activeBoardId, columns = null, updatedAt = null) {
            if (!currentUser || !boardId) return;
            const columnsToPersist = Array.isArray(columns) ? columns : collectBoardColumns();
            const version = normalizeUpdatedAt(updatedAt) || nextSaveVersion();
            persistLocalBoardColumns(boardId, columnsToPersist, { updatedAt: version, dirty: true });
            const priorSave = savePromise || Promise.resolve();
            const nextSave = priorSave
                .catch(() => {
                    // Keep the queue alive even if a previous save failed.
                })
                .then(() => persistBoardColumns(boardId, columnsToPersist, version));
            savePromise = nextSave.finally(() => {
                if (savePromise === nextSave) {
                    savePromise = null;
                    reconcileAfterSave();
                }
            });
        }

        // After a save completes, check whether remote data arrived
        // while savePromise was truthy (which blocks the onSnapshot handler
        // from reconciling columns).  Without this, cross-device updates
        // that land during a local save are silently dropped.
        function reconcileAfterSave() {
            if (savePromise || !boardStoreCache || !activeBoardId) return;
            const remoteState = readBoardState(boardStoreCache, activeBoardId);
            const localSnapshot = readLocalStore();
            const localState = readBoardState(localSnapshot, activeBoardId);

            if (shouldPreferLocalColumns(localState, remoteState)) return;
            if (!Array.isArray(remoteState.columns)) return;

            const remoteVersion = remoteState.meta.updatedAt || nextSaveVersion();
            persistLocalBoardColumns(
                activeBoardId,
                remoteState.columns,
                { updatedAt: remoteVersion, dirty: false }
            );
            const localColumns = collectBoardColumns();
            if (JSON.stringify(localColumns) !== JSON.stringify(remoteState.columns)) {
                cleanupColumns();
                renderColumnsForBoard(remoteState.columns);
            }
        }

        // Debounced entry point — all user actions call this.
        // Batches rapid successive changes into a single write.
        function saveBoard() {
            if (!currentUser || !activeBoardId) return;
            clearTimeout(saveBoardTimer);
            saveBoardTimer = setTimeout(() => {
                saveBoardTimer = null;
                commitSaveNow();
            }, SAVE_DEBOUNCE_MS);
        }

        async function flushPendingSave() {
            // Fire the debounce immediately if one is queued, then await the write.
            if (saveBoardTimer !== null) {
                clearTimeout(saveBoardTimer);
                saveBoardTimer = null;
                commitSaveNow();
            }
            const pending = savePromise;
            if (!pending) return;
            try { await pending; }
            finally {
                if (savePromise === pending) savePromise = null;
            }
        }

        async function flushPendingSaveWithTimeout(timeoutMs = 1500) {
            if (!savePromise && saveBoardTimer === null) return;
            let timedOut = false;
            await Promise.race([
                flushPendingSave(),
                new Promise(resolve => {
                    setTimeout(() => {
                        timedOut = true;
                        resolve();
                    }, timeoutMs);
                })
            ]);
            if (timedOut) {
                console.warn('Proceeding without waiting for pending save to finish.');
            }
        }

        function cleanupColumns() {
            document.querySelectorAll('.column').forEach(col => {
                col.querySelectorAll('.task-input').forEach(input => {
                    if (input._intervalId) clearInterval(input._intervalId);
                });
                col.remove();
            });
        }

        function randomItem(items) {
            return items[Math.floor(Math.random() * items.length)];
        }

        function createDefaultColumns() {
            return DEFAULT_MOUNTAINS.map(name => ({
                id: createEntityId('col'),
                name,
                tasks: [],
                completed: []
            }));
        }

        function generateBoardProfile() {
            const aliases = ['Atlas', 'Nyx', 'Orion', 'Echo', 'Helios', 'Gaia', 'Astra', 'Rhea'];
            const roles = ['Stone Pusher', 'Slope Runner', 'Peak Chaser', 'Path Climber', 'Summit Seeker'];
            const tag = Math.random().toString(36).slice(2, 6).toUpperCase();
            return {
                alias: randomItem(aliases),
                role: randomItem(roles),
                tag
            };
        }

        function nextTaskListName() {
            const nextNum = boardList.length + 1;
            return `Gaia ${nextNum}`;
        }

        function createBoardMeta(name = nextTaskListName()) {
            return {
                id: createEntityId('board'),
                name,
                profile: generateBoardProfile()
            };
        }

        async function persistBoardsIndex() {
            if (!currentUser) return;
            writeLocalStore({ boards: boardList });
            try {
                await setDoc(boardStoreRef(), { boards: boardList }, { merge: true });
            } catch (e) {
                console.error('Saving board index failed:', e);
            }
        }

        function findActiveBoardMeta() {
            return boardList.find(b => b.id === activeBoardId) || null;
        }

        async function renameBoard(boardId) {
            const board = boardList.find(b => b.id === boardId);
            if (!board) return;
            const proposed = await showModal({
                type: 'prompt',
                title: 'Rename World',
                defaultValue: board.name || '',
                placeholder: 'Enter a new name…',
                confirmLabel: 'Rename'
            });
            if (proposed === null) return;
            const name = proposed.trim();
            if (!name) {
                await showModal({ type: 'alert', title: 'Invalid Name', message: 'Task list name cannot be empty.' });
                return;
            }
            board.name = name.slice(0, 100);
            await persistBoardsIndex();
            renderTaskListNav();
        }

        async function reorderBoardList(draggedId, rawInsertIndex) {
            if (!draggedId) return;
            const fromIndex = boardList.findIndex(b => b.id === draggedId);
            if (fromIndex === -1 || boardList.length <= 1) return;
            const totalBoards = boardList.length;
            let insertIndex = Number(rawInsertIndex);
            if (!Number.isInteger(insertIndex)) return;
            if (insertIndex < 0) insertIndex = 0;
            if (insertIndex > totalBoards) insertIndex = totalBoards;
            // Dropping directly before or after itself does not change order.
            if (insertIndex === fromIndex || insertIndex === fromIndex + 1) return;

            const [moved] = boardList.splice(fromIndex, 1);
            const adjustedIndex = insertIndex > fromIndex ? insertIndex - 1 : insertIndex;
            boardList.splice(adjustedIndex, 0, moved);
            await persistBoardsIndex();
            renderTaskListNav();
        }

        function getTaskListDropZones() {
            return Array.from(taskListNav.querySelectorAll('.task-list-drop-zone'));
        }

        function getNearestTaskListDropZone(clientY) {
            const zones = getTaskListDropZones();
            if (zones.length === 0) return null;
            let nearest = zones[0];
            let nearestDistance = Number.POSITIVE_INFINITY;
            zones.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                const centerY = rect.top + rect.height / 2;
                const distance = Math.abs(clientY - centerY);
                if (distance < nearestDistance) {
                    nearestDistance = distance;
                    nearest = zone;
                }
            });
            return nearest;
        }

        function activateNearestTaskListDropZone(clientY) {
            const nearest = getNearestTaskListDropZone(clientY);
            getTaskListDropZones().forEach(zone => zone.classList.remove('active'));
            if (nearest) nearest.classList.add('active');
            return nearest;
        }

        function createTaskListDropZone(insertIndex) {
            const zone = document.createElement('div');
            zone.className = 'task-list-drop-zone';
            zone.dataset.insertIndex = String(insertIndex);

            zone.addEventListener('dragover', e => {
                if (!draggedTaskListId) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                activateNearestTaskListDropZone(e.clientY);
            });

            zone.addEventListener('dragleave', e => {
                if (!zone.contains(e.relatedTarget)) zone.classList.remove('active');
            });

            zone.addEventListener('drop', async e => {
                e.preventDefault();
                e.stopPropagation();
                zone.classList.remove('active');
                const movingId = draggedTaskListId;
                if (!movingId) return;
                taskListNav.classList.remove('task-list-dragging');
                taskListNav.querySelectorAll('.task-list-drop-zone').forEach(el => el.classList.remove('active'));
                await reorderBoardList(movingId, insertIndex);
            });

            return zone;
        }

        taskListNav.addEventListener('dragover', e => {
            if (!draggedTaskListId) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            activateNearestTaskListDropZone(e.clientY);
        });

        taskListNav.addEventListener('drop', async e => {
            if (!draggedTaskListId) return;
            e.preventDefault();
            const movingId = draggedTaskListId;
            const nearestZone = activateNearestTaskListDropZone(e.clientY);
            const fallbackZone = nearestZone || getNearestTaskListDropZone(e.clientY);
            const insertIndex = Number(fallbackZone && fallbackZone.dataset.insertIndex);
            if (!Number.isInteger(insertIndex)) return;

            taskListNav.classList.remove('task-list-dragging');
            taskListNav.querySelectorAll('.task-list-drop-zone').forEach(zone => zone.classList.remove('active'));
            await reorderBoardList(movingId, insertIndex);
        });

        async function deleteBoardList(boardId) {
            const board = boardList.find(b => b.id === boardId);
            if (!board) return;
            if (boardList.length <= 1) {
                await showModal({ type: 'alert', title: 'Cannot Delete', message: 'You need at least one world. Create another before deleting this one.' });
                return;
            }
            const confirmed = await showModal({
                type: 'confirm',
                title: 'Delete World',
                message: `Delete "${board.name}"? This action cannot be undone.`,
                confirmLabel: 'Delete',
                danger: true
            });
            if (!confirmed) return;

            const removedIndex = boardList.findIndex(b => b.id === boardId);
            boardList = boardList.filter(b => b.id !== boardId);
            pendingBoardCreates.delete(boardId);

            const local = readLocalStore();
            if (local.columnsByBoard && typeof local.columnsByBoard === 'object') {
                delete local.columnsByBoard[boardId];
            }
            if (local.columnsMetaByBoard && typeof local.columnsMetaByBoard === 'object') {
                delete local.columnsMetaByBoard[boardId];
            }
            writeLocalStore({
                columnsByBoard: local.columnsByBoard || {},
                columnsMetaByBoard: local.columnsMetaByBoard || {}
            });

            if (activeBoardId === boardId) {
                const fallbackIndex = Math.max(0, removedIndex - 1);
                const fallbackBoard = boardList[fallbackIndex] || boardList[0];
                if (fallbackBoard) {
                    activeBoardId = fallbackBoard.id;
                    await loadBoard(fallbackBoard.id);
                } else {
                    cleanupColumns();
                    activeBoardId = null;
                }
            }
            renderTaskListNav();

            // Persist deletions in background so UI never waits on network.
            persistBoardsIndex().catch(e => {
                console.warn('Could not persist board index after deletion:', e);
            });
            setDoc(
                boardStoreRef(),
                {
                    columnsByBoard: { [boardId]: deleteField() },
                    columnsMetaByBoard: { [boardId]: deleteField() }
                },
                { merge: true }
            ).catch(e => {
                console.warn('Could not delete task list document:', e);
            });
        }

        function updateBoardUserInfo() {
            const activeBoard = findActiveBoardMeta();
            if (!activeBoard) {
                currentTaskListLabel.textContent = '';
                currentTaskListLabel.removeAttribute('data-tooltip');
                return;
            }
            const profile = activeBoard.profile || {};
            const alias = profile.alias || 'Sisyphus';
            const role = profile.role || 'Stone Pusher';
            const tag = profile.tag || '0000';
            currentTaskListLabel.textContent = activeBoard.name || '';
            currentTaskListLabel.dataset.tooltip = `Click to rename task list (${alias} / ${role} #${tag})`;
        }

        function renderTaskListNav() {
            taskListNav.innerHTML = '';
            boardList.forEach((board, index) => {
                taskListNav.appendChild(createTaskListDropZone(index));

                // Use a <div> rather than <button> — a <button> cannot legally contain
                // other <button>s (interactive content nesting is invalid HTML).
                // tabIndex + keydown restore keyboard accessibility for board switching.
                const item = document.createElement('div');
                item.tabIndex = 0;
                item.setAttribute('role', 'button');
                item.className = 'task-list-item' + (board.id === activeBoardId ? ' active' : '');
                item.draggable = false;
                item.dataset.boardId = board.id;
                item.innerHTML = `
                    <span class="task-list-head">
                        <span class="task-list-name"></span>
                        <span class="task-list-actions">
                            <button class="rename-list-btn" type="button" data-tooltip="Rename task list">Aa</button>
                            <button class="delete-list-btn" type="button" data-tooltip="Delete task list">×</button>
                        </span>
                    </span>
                `;
                item.querySelector('.task-list-name').textContent = board.name || 'Gaia';
                const renameBtn = item.querySelector('.rename-list-btn');
                const deleteBtn = item.querySelector('.delete-list-btn');
                const suppressActionDrag = e => {
                    item.draggable = false;
                    e.stopPropagation();
                };

                renameBtn.addEventListener('mousedown', suppressActionDrag);
                deleteBtn.addEventListener('mousedown', suppressActionDrag);

                renameBtn.addEventListener('click', async e => {
                    e.stopPropagation();
                    await renameBoard(board.id);
                });
                deleteBtn.addEventListener('click', async e => {
                    e.stopPropagation();
                    await deleteBoardList(board.id);
                });

                item.addEventListener('mousedown', e => {
                    if (e.button !== 0) return;
                    if (e.target.closest('.task-list-actions')) return;
                    item.draggable = true;
                });
                item.addEventListener('mouseup', () => {
                    if (!draggedTaskListId) item.draggable = false;
                });
                item.addEventListener('mouseleave', () => {
                    if (!draggedTaskListId) item.draggable = false;
                });
                item.addEventListener('dragstart', e => {
                    if (!item.draggable) {
                        e.preventDefault();
                        return;
                    }
                    draggedTaskListId = board.id;
                    taskListNav.classList.add('task-list-dragging');
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', board.id);
                });
                item.addEventListener('dragend', () => {
                    draggedTaskListId = null;
                    item.draggable = false;
                    taskListNav.classList.remove('task-list-dragging');
                    item.classList.remove('dragging');
                    taskListNav.querySelectorAll('.task-list-drop-zone').forEach(el => el.classList.remove('active'));
                });
                item.addEventListener('click', async () => {
                    if (board.id === activeBoardId) return;
                    await switchToBoard(board.id);
                });
                item.addEventListener('keydown', async e => {
                    // Ignore key events originating from nested controls (rename/delete buttons).
                    if (e.target !== item) return;
                    if (e.key !== 'Enter' && e.key !== ' ' && e.key !== 'Spacebar') return;
                    e.preventDefault();
                    if (board.id === activeBoardId) return;
                    await switchToBoard(board.id);
                });
                taskListNav.appendChild(item);
            });
            if (boardList.length > 0) {
                taskListNav.appendChild(createTaskListDropZone(boardList.length));
            }
            updateBoardUserInfo();
        }

        function renderColumnsForBoard(columns) {
            if (Array.isArray(columns) && columns.length > 0) {
                columns.forEach(c => {
                    const col = createColumnElement(c.id, c.name, c.tasks || [], c.completed || []);
                    insertColumnIntoBoard(col);
                });
                return;
            }
            renderDefaultColumns();
        }

        function normalizeBoards(boards) {
            if (!Array.isArray(boards)) return [];
            return boards
                .filter(board => board && typeof board === 'object' && typeof board.id === 'string')
                .map(board => ({
                    id: board.id,
                    name: board.name || 'Gaia',
                    profile: board.profile || generateBoardProfile()
                }));
        }

        function subscribeBoardStore() {
            if (!currentUser) return;
            if (unsubscribeBoardStore) unsubscribeBoardStore();
            unsubscribeBoardStore = onSnapshot(
                boardStoreRef(),
                snap => {
                    boardStoreCache = snap.exists() ? snap.data() : {};
                    const remoteBoards = normalizeBoards(boardStoreCache.boards);
                    if (remoteBoards.length > 0) {
                        const remoteIds = new Set(remoteBoards.map(b => b.id));
                        pendingBoardCreates.forEach(id => {
                            if (remoteIds.has(id)) pendingBoardCreates.delete(id);
                        });
                        const pendingLocalBoards = boardList.filter(
                            board => pendingBoardCreates.has(board.id) && !remoteIds.has(board.id)
                        );
                        const effectiveBoards = pendingLocalBoards.length > 0
                            ? [...remoteBoards, ...pendingLocalBoards]
                            : remoteBoards;
                        const remoteSig = JSON.stringify(effectiveBoards.map(b => ({ id: b.id, name: b.name })));
                        const localSig = JSON.stringify(boardList.map(b => ({ id: b.id, name: b.name })));
                        if (remoteSig !== localSig) {
                            boardList = effectiveBoards;
                        }
                    }

                    if (!boardList.length) return;
                    if (!activeBoardId || !boardList.some(b => b.id === activeBoardId)) {
                        activeBoardId = boardList[0].id;
                    }

                    if (!savePromise) {
                        const localSnapshot = readLocalStore();
                        const remoteState = readBoardState(boardStoreCache, activeBoardId);
                        const localState = readBoardState(localSnapshot, activeBoardId);

                        if (shouldPreferLocalColumns(localState, remoteState)) {
                            if (localState.meta.dirty && Array.isArray(localState.columns)) {
                                commitSaveNow(activeBoardId, localState.columns, localState.meta.updatedAt);
                            }
                        } else if (Array.isArray(remoteState.columns)) {
                            const remoteVersion = remoteState.meta.updatedAt || nextSaveVersion();
                            persistLocalBoardColumns(
                                activeBoardId,
                                remoteState.columns,
                                { updatedAt: remoteVersion, dirty: false }
                            );
                            const localColumns = collectBoardColumns();
                            if (JSON.stringify(localColumns) !== JSON.stringify(remoteState.columns)) {
                                cleanupColumns();
                                renderColumnsForBoard(remoteState.columns);
                            }
                        }
                    }
                    renderTaskListNav();
                },
                e => {
                    console.error('Live sync failed:', e);
                }
            );
        }

        function unsubscribeBoardStoreListener() {
            if (!unsubscribeBoardStore) return;
            unsubscribeBoardStore();
            unsubscribeBoardStore = null;
        }

        async function loadBoard(boardId) {
            cleanupColumns();
            activeBoardId = boardId;
            try {
                const data = await getBoardStoreData();
                const localSnapshot = readLocalStore();
                const remoteState = readBoardState(data, boardId);
                const localState = readBoardState(localSnapshot, boardId);

                let columnsToRender = null;
                if (shouldPreferLocalColumns(localState, remoteState)) {
                    columnsToRender = localState.columns;
                    if (localState.meta.dirty && Array.isArray(localState.columns)) {
                        commitSaveNow(boardId, localState.columns, localState.meta.updatedAt);
                    }
                } else if (Array.isArray(remoteState.columns)) {
                    columnsToRender = remoteState.columns;
                    const remoteVersion = remoteState.meta.updatedAt || nextSaveVersion();
                    persistLocalBoardColumns(
                        boardId,
                        remoteState.columns,
                        { updatedAt: remoteVersion, dirty: false }
                    );
                } else if (Array.isArray(localState.columns)) {
                    columnsToRender = localState.columns;
                    if (localState.meta.dirty) {
                        commitSaveNow(boardId, localState.columns, localState.meta.updatedAt);
                    }
                }

                renderColumnsForBoard(columnsToRender);
            } catch (e) {
                console.error('Load failed:', e);
                const local = readLocalStore();
                const localState = readBoardState(local, boardId);
                if (Array.isArray(localState.columns) && localState.columns.length > 0) {
                    renderColumnsForBoard(localState.columns);
                } else {
                    renderDefaultColumns();
                }
            }
        }

        async function switchToBoard(boardId) {
            if (!currentUser || !boardId) return;
            await flushPendingSave();
            await loadBoard(boardId);
            renderTaskListNav();
        }

        async function createTaskList() {
            if (!currentUser) {
                await showModal({ type: 'alert', title: 'Not Signed In', message: 'Please sign in again before creating a new world.' });
                return;
            }
            newTaskListBtn.disabled = true;
            try {
                await flushPendingSaveWithTimeout();
                const defaultColumns = createDefaultColumns();
                const newBoard = createBoardMeta();
                boardList.push(newBoard);
                pendingBoardCreates.add(newBoard.id);
                renderTaskListNav();
                await loadBoard(newBoard.id);
                const seedVersion = nextSaveVersion();
                try {
                    await setDoc(
                        boardStoreRef(),
                        {
                            columnsByBoard: { [newBoard.id]: defaultColumns },
                            columnsMetaByBoard: { [newBoard.id]: { updatedAt: seedVersion } }
                        },
                        { merge: true }
                    );
                    persistLocalBoardColumns(
                        newBoard.id,
                        defaultColumns,
                        { updatedAt: seedVersion, dirty: false }
                    );
                } catch (e) {
                    console.warn('Could not pre-seed default columns for new task list:', e);
                    persistLocalBoardColumns(
                        newBoard.id,
                        defaultColumns,
                        { updatedAt: seedVersion, dirty: true }
                    );
                }
                await persistBoardsIndex();
                renderTaskListNav();
            } catch (e) {
                console.error('Failed to create task list:', e);
                await showModal({ type: 'alert', title: 'Error', message: 'Could not create a new world right now. Please try again.' });
            } finally {
                newTaskListBtn.disabled = false;
            }
        }

        async function initializeBoards() {
            try {
                const data = await getBoardStoreData();
                const local = readLocalStore();
                const boardsSource = Array.isArray(data.boards) && data.boards.length > 0
                    ? data.boards
                    : null;
                if (boardsSource && boardsSource.length > 0) {
                    const remoteBoards = normalizeBoards(boardsSource);
                    const localBoards = Array.isArray(local.boards) ? normalizeBoards(local.boards) : [];
                    const remoteIds = new Set(remoteBoards.map(board => board.id));
                    const localOnlyBoards = localBoards.filter(board => {
                        if (remoteIds.has(board.id)) return false;
                        const localState = readBoardState(local, board.id);
                        return Array.isArray(localState.columns) || localState.meta.dirty;
                    });
                    boardList = localOnlyBoards.length > 0
                        ? [...remoteBoards, ...localOnlyBoards]
                        : remoteBoards;
                    if (localOnlyBoards.length > 0) {
                        // Promote locally-created boards that never made it to cloud.
                        await persistBoardsIndex();
                    }
                } else if (Array.isArray(local.boards) && local.boards.length > 0) {
                    // One-time recovery path: promote local cache to cloud if remote index is empty.
                    boardList = normalizeBoards(local.boards);
                    await persistBoardsIndex();
                    const localColumnsByBoard = local.columnsByBoard && typeof local.columnsByBoard === 'object'
                        ? local.columnsByBoard
                        : {};
                    const localColumnsMetaByBoard = local.columnsMetaByBoard && typeof local.columnsMetaByBoard === 'object'
                        ? local.columnsMetaByBoard
                        : {};
                    for (const board of boardList) {
                        const cachedCols = localColumnsByBoard[board.id];
                        if (Array.isArray(cachedCols)) {
                            const cachedMeta = localColumnsMetaByBoard[board.id];
                            const cachedUpdatedAt = normalizeUpdatedAt(cachedMeta && cachedMeta.updatedAt) || nextSaveVersion();
                            await setDoc(
                                boardStoreRef(),
                                {
                                    columnsByBoard: { [board.id]: cachedCols },
                                    columnsMetaByBoard: { [board.id]: { updatedAt: cachedUpdatedAt } }
                                },
                                { merge: true }
                            );
                            markLocalBoardCleanIfCurrent(board.id, cachedUpdatedAt);
                        }
                    }
                } else {
                    // Migration path: if legacy single-board data exists, seed Gaia 1 from it.
                    const seededColumns = Array.isArray(data.columns)
                        ? data.columns
                        : createDefaultColumns();
                    boardList = [createBoardMeta('Gaia 1')];
                    const seedVersion = nextSaveVersion();
                    try {
                        await setDoc(
                            boardStoreRef(),
                            {
                                columnsByBoard: { [boardList[0].id]: seededColumns },
                                columnsMetaByBoard: { [boardList[0].id]: { updatedAt: seedVersion } }
                            },
                            { merge: true }
                        );
                        persistLocalBoardColumns(
                            boardList[0].id,
                            seededColumns,
                            { updatedAt: seedVersion, dirty: false }
                        );
                    } catch (e) {
                        console.warn('Could not pre-seed first task list:', e);
                        persistLocalBoardColumns(
                            boardList[0].id,
                            seededColumns,
                            { updatedAt: seedVersion, dirty: true }
                        );
                    }
                    writeLocalStore({
                        boards: boardList
                    });
                    await persistBoardsIndex();
                }

                queueDirtyLocalBoardsForSync(data);
                const preferredBoard = activeBoardId && boardList.some(b => b.id === activeBoardId)
                    ? activeBoardId
                    : boardList[0].id;
                await loadBoard(preferredBoard);
                renderTaskListNav();
            } catch (e) {
                console.error('Board initialization failed:', e);
                // Ensure first-time users always land on Gaia 1, even if remote init fails.
                if (!boardList.length) {
                    boardList = [createBoardMeta('Gaia 1')];
                }
                await loadBoard(boardList[0].id);
                renderTaskListNav();
            }
        }

        // ── Helpers ───────────────────────────────────────────────────
        function updateDivider(col) {
            const hasCompleted = col.querySelector('.completed-list').children.length > 0;
            col.querySelector('.completed-divider').classList.toggle('visible', hasCompleted);
        }

        function createTaskCard(text, done = false) {
            const li = document.createElement('li');
            li.className = 'task-card' + (done ? ' done' : '');
            li.draggable = true;

            // Use textContent (never innerHTML) for user-supplied text to prevent XSS
            const span = document.createElement('span');
            span.textContent = text;

            const doneBtn = document.createElement('button');
            doneBtn.className = done ? 'done-btn undo' : 'done-btn';
            doneBtn.textContent = done ? 'It Rolled Back' : 'Summit!';
            doneBtn.addEventListener('click', () => toggleDone(li));

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-task-btn';
            deleteBtn.textContent = 'Drop It';
            deleteBtn.addEventListener('click', () => deleteTask(li));

            const buttons = document.createElement('div');
            buttons.className = 'card-buttons';
            buttons.appendChild(doneBtn);
            buttons.appendChild(deleteBtn);

            li.appendChild(span);
            li.appendChild(buttons);
            span.dataset.tooltip = 'Click to edit task';
            span.addEventListener('click', e => {
                e.stopPropagation();
                beginInlineTaskEdit(li);
            });

            li.addEventListener('dragstart', e => {
                draggedCard = li;
                li.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            li.addEventListener('dragend', () => {
                li.classList.remove('dragging');
                document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
            });
            return li;
        }

        function beginInlineTaskEdit(card) {
            if (!card || card.dataset.inlineEditing === 'true') return;
            const textEl = card.querySelector('span');
            if (!textEl) return;

            const originalText = textEl.textContent || '';
            const wasDraggable = card.draggable;
            card.dataset.inlineEditing = 'true';
            card.classList.add('editing');
            card.draggable = false;
            textEl.setAttribute('contenteditable', 'true');
            textEl.spellcheck = true;
            textEl.focus();

            const selection = window.getSelection();
            if (selection) {
                const range = document.createRange();
                range.selectNodeContents(textEl);
                range.collapse(false);
                selection.removeAllRanges();
                selection.addRange(range);
            }

            let cancelled = false;
            const finish = () => {
                textEl.removeEventListener('keydown', onKeydown);
                textEl.removeEventListener('blur', onBlur);
                textEl.removeAttribute('contenteditable');
                textEl.spellcheck = false;
                card.classList.remove('editing');
                card.draggable = wasDraggable;
                delete card.dataset.inlineEditing;

                if (cancelled) {
                    textEl.textContent = originalText;
                    return;
                }

                let nextText = (textEl.textContent || '').trim();
                if (!nextText) {
                    textEl.textContent = originalText;
                    return;
                }
                if (nextText.length > 500) {
                    nextText = nextText.slice(0, 500);
                }
                textEl.textContent = nextText;
                if (nextText !== originalText) saveBoard();
            };

            const onKeydown = e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    textEl.blur();
                    return;
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    cancelled = true;
                    textEl.blur();
                }
            };

            const onBlur = () => finish();
            textEl.addEventListener('keydown', onKeydown);
            textEl.addEventListener('blur', onBlur);
        }

        // ── Column drop zones ─────────────────────────────────────────
        function makeDropZone() {
            const zone = document.createElement('div');
            zone.className = 'col-drop-zone';
            zone.addEventListener('dragover', e => {
                e.preventDefault();
                document.querySelectorAll('.col-drop-zone').forEach(z => z.classList.remove('active'));
                zone.classList.add('active');
                activeDropZone = zone;
            });
            zone.addEventListener('dragleave', () => zone.classList.remove('active'));
            zone.addEventListener('drop', e => e.preventDefault());
            return zone;
        }

        function showDropZones() {
            boardEl.querySelectorAll('.column').forEach(col => boardEl.insertBefore(makeDropZone(), col));
            insertColumnIntoBoard(makeDropZone());
        }

        function hideDropZones() {
            document.querySelectorAll('.col-drop-zone').forEach(z => z.remove());
            activeDropZone = null;
        }

        function createColumnElement(id, name, tasks = [], completed = []) {
            const col = document.createElement('div');
            col.className = 'column';
            col.dataset.id = id;
            col.innerHTML = `
                <div class="column-header">
                    <div class="col-drag-handle" data-tooltip="Drag to reorder">⠿</div>
                    <input class="column-title" type="text" data-tooltip="Click to rename" maxlength="100" />
                    <button class="delete-col-btn" data-tooltip="Delete column">✕</button>
                </div>
                <div class="task-input-row">
                    <input class="task-input" type="text" maxlength="500" />
                    <button class="add-task-btn">Push It</button>
                </div>
                <ul class="task-list"></ul>
                <div class="completed-divider">Rolled Over the Top</div>
                <ul class="completed-list"></ul>`;

            // Set column title via .value (not innerHTML) to prevent XSS from saved names
            col.querySelector('.column-title').value = name;

            col.querySelector('.column-title').addEventListener('change', saveBoard);
            col.querySelector('.delete-col-btn').addEventListener('click', () => deleteColumn(col));
            col.querySelector('.add-task-btn').addEventListener('click', () => addTask(col));
            startPlaceholderRotation(col.querySelector('.task-input'));
            col.querySelector('.task-input').addEventListener('keypress', e => {
                if (e.key === 'Enter') addTask(col);
            });

            // Column drag handle
            const handle = col.querySelector('.col-drag-handle');
            handle.addEventListener('mousedown', () => col.draggable = true);
            handle.addEventListener('mouseup', () => col.draggable = false);
            col.addEventListener('dragstart', e => {
                // Ignore if this is a task card drag bubbling up
                if (draggedCard !== null || !col.draggable) return;
                draggedColumn = col;
                activeDropZone = null;
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => { col.classList.add('col-dragging'); showDropZones(); }, 0);
            });
            col.addEventListener('dragend', () => {
                col.draggable = false;
                col.classList.remove('col-dragging');
                if (draggedColumn && activeDropZone) {
                    const nextEl = activeDropZone.nextElementSibling;
                    insertColumnIntoBoard(draggedColumn, nextEl || addColumnBtn);
                    saveBoard();
                }
                draggedColumn = null;
                hideDropZones();
            });

            // Task card drop handling on column
            col.addEventListener('dragover', e => {
                e.preventDefault();
                if (draggedCard) col.classList.add('drag-over');
            });
            col.addEventListener('dragleave', e => {
                if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
            });
            col.addEventListener('drop', e => {
                e.preventDefault();
                col.classList.remove('drag-over');
                if (draggedCard) {
                    const target = draggedCard.classList.contains('done')
                        ? col.querySelector('.completed-list')
                        : col.querySelector('.task-list');
                    target.appendChild(draggedCard);
                    document.querySelectorAll('.column').forEach(c => updateDivider(c));
                    draggedCard = null;
                    saveBoard();
                }
            });

            tasks.forEach(t => col.querySelector('.task-list').appendChild(createTaskCard(t, false)));
            completed.forEach(t => col.querySelector('.completed-list').appendChild(createTaskCard(t, true)));
            updateDivider(col);
            return col;
        }

        // ── Actions ───────────────────────────────────────────────────
        function addTask(col) {
            const input = col.querySelector('.task-input');
            const text = input.value.trim();
            if (!text) return;
            col.querySelector('.task-list').prepend(createTaskCard(text, false));
            input.value = '';
            if (input._rotatePlaceholder) input._rotatePlaceholder();
            saveBoard();
        }

        function toggleDone(card) {
            const col = card.closest('.column');
            const wasDone = card.classList.contains('done');
            const isDone = card.classList.toggle('done');
            const btn = card.querySelector('.done-btn');
            btn.textContent = isDone ? 'It Rolled Back' : 'Summit!';
            btn.classList.toggle('undo', isDone);
            if (wasDone) playRollbackVideo();
            else playSummitVideo();
            col.querySelector(isDone ? '.completed-list' : '.task-list')[isDone ? 'appendChild' : 'prepend'](card);
            updateDivider(col);
            saveBoard();
        }

        function deleteTask(card) {
            const col = card.closest('.column');
            playCrushedVideo();
            card.remove();
            updateDivider(col);
            saveBoard();
        }

        async function deleteColumn(col) {
            const taskCount = col.querySelectorAll('.task-card').length;
            const msg = taskCount > 0
                ? `Abandon this struggle and its ${taskCount} task${taskCount > 1 ? 's' : ''}? This cannot be undone.`
                : 'Abandon this struggle? This cannot be undone.';
            const confirmed = await showModal({
                type: 'confirm',
                title: 'Abandon Struggle',
                message: msg,
                confirmLabel: 'Abandon',
                danger: true
            });
            if (!confirmed) return;
            // Clear placeholder rotation intervals before removing the column
            col.querySelectorAll('.task-input').forEach(input => {
                if (input._intervalId) clearInterval(input._intervalId);
            });
            col.remove();
            saveBoard();
        }

        function addColumn(name = null, tasks = [], completed = []) {
            if (!name) {
                const count = document.querySelectorAll('.column').length + 1;
                name = 'Mountain ' + count;
            }
            if (name.length > 100) name = name.slice(0, 100);
            const id = createEntityId('col');
            const col = createColumnElement(id, name, tasks, completed);
            insertColumnIntoBoard(col);
            saveBoard();
            return col;
        }

        // ── Auth ──────────────────────────────────────────────────────
        signInBtn.addEventListener('click', async () => {
            signInError.style.display = 'none';
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
                    // Popup was blocked — fall back to redirect
                    try { await signInWithRedirect(auth, provider); }
                    catch (e2) {
                        console.error('Redirect sign in failed:', e2);
                        signInError.textContent = 'Sign in failed: ' + (e2.message || e2.code);
                        signInError.style.display = 'block';
                    }
                } else {
                    console.error('Sign in failed:', e);
                    signInError.textContent = 'Sign in failed: ' + (e.message || e.code);
                    signInError.style.display = 'block';
                }
            }
        });

        // Handle redirect result when returning from Google login without
        // blocking subsequent event listener wiring.
        getRedirectResult(auth).catch(e => {
            console.error('Redirect result error:', e);
        });

        signOutBtn.addEventListener('click', async () => {
            try {
                await flushPendingSave();
                // Sign out first; onAuthStateChanged will handle clearing the board UI
                await signOut(auth);
            } catch (e) {
                console.error('Sign out failed:', e);
                await showModal({ type: 'alert', title: 'Sign Out Failed', message: 'Sign out failed — please try again.' });
            }
        });

        addColumnBtn.addEventListener('click', () => addColumn());
        newTaskListBtn.addEventListener('click', createTaskList);
        window.addEventListener('beforeunload', () => {
            // Skip debounce and persist a local snapshot synchronously before close.
            if (currentUser && activeBoardId) {
                clearTimeout(saveBoardTimer);
                saveBoardTimer = null;
                const boardId = activeBoardId;
                const columns = collectBoardColumns();
                // Best-effort cloud enqueue; may not complete before teardown.
                commitSaveNow(boardId, columns);
            }
        });

        // Prevent snap-back when dropping column over child elements
        document.addEventListener('dragover', e => {
            if (draggedColumn) e.preventDefault();
        });
        document.addEventListener('drop', e => {
            if (draggedColumn) e.preventDefault();
        });

        async function applyAuthenticatedState(user) {
            currentUser = user;
            loginScreen.style.display = 'none';
            loadingScreen.style.display = 'flex';

            const accountLabel = user.email || user.displayName || 'Unknown account';
            userName.textContent = accountLabel;
            userAvatar.src = user.photoURL || '';
            userAvatar.style.display = user.photoURL ? 'block' : 'none';
            userAvatar.dataset.tooltip = accountLabel;
            userAvatar.alt = accountLabel;
            userAvatar.setAttribute('aria-label', accountLabel);

            userBar.style.display = 'flex';
            sidebar.style.display = 'block';
            boardStoreCache = null;
            subscribeBoardStore();

            await initializeBoards();
            loadingScreen.style.display = 'none';
            boardEl.style.display = 'flex';
        }

        async function applySignedOutState() {
            await flushPendingSave();
            unsubscribeBoardStoreListener();

            currentUser = null;
            activeBoardId = null;
            boardList = [];
            boardStoreCache = null;
            pendingBoardCreates.clear();

            cleanupColumns();
            taskListNav.innerHTML = '';
            updateBoardUserInfo();
            userAvatar.src = '';
            userAvatar.removeAttribute('data-tooltip');
            userAvatar.alt = '';
            userAvatar.removeAttribute('aria-label');
            userAvatar.style.display = 'none';

            boardEl.style.display = 'none';
            loadingScreen.style.display = 'none';
            userBar.style.display = 'none';
            sidebar.style.display = 'none';
            loginScreen.style.display = 'flex';
        }

        onAuthStateChanged(auth, async user => {
            if (user) {
                await applyAuthenticatedState(user);
                return;
            }
            await applySignedOutState();
        });
    </script>
</body>
</html>
