<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sisyphus</title>

<!-- Formatting Section -->
    <style>
        /* Overall Design Template*/
        html {
            min-height: 100%;
            background: url('SisyphusImage1.png') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            background: rgba(245, 245, 245, 0.88);
            border-radius: 8px;
        }

        /* Heading 1 Design */
        h1 { color: #333;font-size: 20px; }

        /* Input Task Box Formatting */
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        input::placeholder {
            font-style: italic;
        }

        /* Button Design Template */
        button {
            padding: 10px 16px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }
        /* Task container */
        ul { list-style: none; padding: 0; margin-top: 24px; }

        /* Task Design */
        li {
            background: white;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Strikethrough when task is done */
        li.done span { text-decoration: line-through; color: #aaa; }

        /* Divider with "Completed" label above first done task */
        li:not(.done) + li.done {
            margin-top: 40px;
            position: relative;
        }

        li:not(.done) + li.done::after {
            content: '';
            position: absolute;
            top: -20px;
            left: 0;
            right: 0;
            height: 1px;
            background: #ccc;
        }

        li:not(.done) + li.done::before {
            content: 'Completed';
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(245, 245, 245, 0.88);
            padding: 0 10px;
            color: #aaa;
            font-size: 12px;
            white-space: nowrap;
            z-index: 1;
        }
        .delete { background: #e74c3c; padding: 6px 10px; font-size: 13px; }
        .done-btn { background: #2196F3; padding: 6px 10px; font-size: 13px; }
        .button-group { display: flex; gap: 4px; }
        .input-row {
    display: flex;
    gap: 8px;
}
        .note {
            font-style: italic;
            color: #666;
            margin-top: 30px;
            font-size: 14px;
            text-align: center;
        }
    </style>


</head>
<body>
    <h1>Hey Sisyphus, Get That Bolder Rolling!</h1>

    
<div class="input-row">
    <input type="text" id="taskInput" placeholder="Awwww Shiiit. Here we go again..." />
    <button onclick="addTask()">Task Me Harder</button>
</div>
    <ul id="taskList"></ul>

    <script>
        function saveTasks() {
            const tasks = [];
            document.querySelectorAll('#taskList li').forEach(li => {
                tasks.push({
                    text: li.querySelector('span').textContent,
                    done: li.classList.contains('done')
                });
            });
            localStorage.setItem('sisyphusTasks', JSON.stringify(tasks));
        }

        function createTaskElement(text, done = false) {
            const li = document.createElement('li');
            if (done) li.classList.add('done');
            li.innerHTML = `
                <span>${text}</span>
                <div class="button-group">
                    <button class="done-btn" onclick="toggleDone(this.parentElement.parentElement)">Done</button>
                    <button class="delete" onclick="deleteTask(this.parentElement.parentElement)">Delete Me</button>
                </div>
            `;
            return li;
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;
            document.getElementById('taskList').prepend(createTaskElement(text));
            input.value = '';
            saveTasks();
        }

        function toggleDone(li) {
            li.classList.toggle('done');
            const taskList = document.getElementById('taskList');
            if (li.classList.contains('done')) {
                taskList.appendChild(li);
            } else {
                taskList.prepend(li);
            }
            saveTasks();
        }

        function deleteTask(li) {
            li.remove();
            saveTasks();
        }

        function loadTasks() {
            const saved = localStorage.getItem('sisyphusTasks');
            if (!saved) return;
            const tasks = JSON.parse(saved);
            const active = tasks.filter(t => !t.done);
            const done = tasks.filter(t => t.done);
            [...active, ...done].forEach(task => {
                document.getElementById('taskList').appendChild(createTaskElement(task.text, task.done));
            });
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        loadTasks();
    </script>
    <p class="note">Note: If you refresh your browser history, you will lose your task list</p>
</body>
</html>
